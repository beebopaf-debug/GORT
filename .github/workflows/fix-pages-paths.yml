name: Fix GitHub Pages paths

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-paths:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Rewrite root-relative HTML paths
        run: |
          python - <<'PY'
          from pathlib import Path

          for path in Path('.').rglob('*.html'):
              if '.git' in path.parts or path.parts[0] == 'EXtract':
                  continue

              text = path.read_text(encoding='utf-8')
              depth = len(path.parent.parts)
              home = './' if depth == 0 else '../'
              prefix = '' if depth == 0 else '../'

              updated = text.replace('Â©', '&copy;')
              updated = updated.replace('href="/"', f'href="{home}"')
              updated = updated.replace('href="/', f'href="{prefix}')
              updated = updated.replace('src="/', f'src="{prefix}')

              if updated != text:
                  path.write_text(updated, encoding='utf-8', newline='\n')
          PY

      - name: Commit rewritten paths
        run: |
          rm -f .github/workflows/fix-pages-paths.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No path changes needed."
          else
            git add -A
            git commit -m "Fix GitHub Pages relative paths"
            git push
          fi
